services:
  - type: web
    name: text-to-speech
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: saves-data
      mountPath: /opt/render/project/src/saves
      sizeGB: 1
